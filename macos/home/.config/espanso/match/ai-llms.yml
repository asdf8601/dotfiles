matches:
- trigger: ";sum"
  replace: "{{out}}"
  force_clipboard: true
  vars:
  - name: out
    type: shell
    params:
      cmd: "pbpaste | ~/.local/bin/espanso_gpt_summary.sh"
- trigger: ";chat"
  replace: "{{out}}"
  force_clipboard: true
  vars:
  - name: out
    type: shell
    params:
      cmd: "pbpaste  | ~/.local/bin/espanso_gpt.sh"
- trigger: ";trad"
  replace: "{{out}}"
  force_clipboard: true
  vars:
  - name: out
    type: shell
    params:
      cmd: "pbpaste | ~/.local/bin/espanso_gpt_trad.sh"
- trigger: ";fix"
  replace: "{{out}}"
  force_clipboard: true
  vars:
  - name: out
    type: shell
    params:
      cmd: "pbpaste | ~/.local/bin/espanso_gpt_fix.sh"
